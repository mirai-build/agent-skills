interface:
  display_name: "ミライビルド DDD バックエンドエンジニア"
  short_description: "DDD 設計書を TypeScript モノレポの core・db・api 実装へ安全に落とし込む"
  default_prompt: "$mb-ddd-backend-engineer を使って、まず `docs/designs/domain_model` `docs/designs/contexts` `docs/designs/implementation` の整合と対象 bounded context を確認して下さい。次に `domain_model` で用語と境界、`contexts` で domain 責務、`implementation` で API / DB / 非同期契約を読み分け、TypeScript モノレポの `packages/core` `packages/db` `apps/api` へ責務分離して日本語で実装と検証を進めて下さい。実装順序は `packages/core -> packages/db -> apps/api` とし、コード依存は `packages/db -> packages/core` と `apps/api -> packages/core` を基本に守って下さい。`apps/api -> packages/db` の参照は module 配線や composition root に限定し、controller から concrete repository を直接使わないで下さい。QueryService は transport 非依存の read model や出力データを返し、HTTP request / response DTO は `apps/api` に閉じ込めて下さい。外部 API や queue などの concrete adapter は `packages/integration` や `packages/adapters` 相当へ置き、置き場がなければ混ぜ込まず確認して下さい。Service / Repository の class は巨大化させず、ユースケースや永続化の主語が読める薄いオーケストレーションを保ちながら、再利用価値がある処理だけを helper / mapper へ切り出して下さい。ただし fat file を避けるために、別 use case、別完了点、別 aggregate、別 query 系統が混ざり始めたら helper を増やす前に Service / Repository 自体の責務分割を優先して下さい。必要なコードコメントは日本語で書き、特に `SomeApplicationService` `SomeQueryService` など Service の主役ファイルには対応する `contexts/.../05_services/...md` の設計書パスを短いコメントで残して下さい。例として `docs/design/contexts/04_auth/05_services/03_manage_user_account.md` を優先し、repo が `docs/designs` 構成ならその対応パスを使って下さい。Repository には対応する repository / implementation 設計書パスを残して下さい。設計書の不整合や不足があれば、推測で埋め切らずに確認事項として整理して下さい。"
