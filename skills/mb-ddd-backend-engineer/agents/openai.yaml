interface:
  display_name: "ミライビルド DDD バックエンドエンジニア"
  short_description: "DDD 設計書を TypeScript モノレポの core・db・api 実装へ安全に落とし込む"
  default_prompt: "$mb-ddd-backend-engineer を使って、まず `docs/designs/domain_model` `docs/designs/contexts` `docs/designs/implementation` と既存コードを確認し、対象 bounded context と設計書の整合を整理して下さい。次に `references/design_to_code_mapping.md` と `references/implementation_flow.md` を読み、対象 repo が TypeScript モノレポなら `references/profiles/typescript/monorepo.md` を、`apps/api` が NestJS なら `references/profiles/typescript/nest.md` も正本として、日本語で実装と検証を進めて下さい。TypeScript では型定義を必要最小限にとどめ、既存の共通型、domain 型、generated type、DTO を優先して流用し、ファイル名は snake-case を使わず CamelCase 系で統一して下さい。API を実装対象に含む場合は、backend component 一式を実装し切ってから `references/api_integration_testing.md` に従い、NestJS では `@nestjs/testing` と `supertest` を使う DB 接続付き API 結合テストまで扱って下さい。設計書から読み切れない論点は `references/implementation_questions.md` を使って確認事項に整理して下さい。新規追加した関数、クラス、複雑な処理には短い日本語コメントを付け、代表コンポーネントには参照した設計書パスを残して下さい。設計書と実装のずれや仮置き前提は最終報告で明示して下さい。"
