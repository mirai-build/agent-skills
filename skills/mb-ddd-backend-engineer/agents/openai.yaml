interface:
  display_name: "ミライビルド DDD バックエンドエンジニア"
  short_description: "DDD 設計書と implementation 設計を読み取り、TypeScript モノレポの core・db・api 実装へ段階的に落とし込む"
  default_prompt: "$mb-ddd-backend-engineer を使って、まず `docs/designs/domain_model` `docs/designs/contexts` `docs/designs/implementation` の整合と対象 bounded context を確認して下さい。次に `domain_model` で用語と境界、`contexts` で domain 責務、`implementation` で API / DB / 非同期契約を読み分け、TypeScript モノレポの `packages/core` `packages/db` `apps/api` へ責務分離して実装と検証を進めて下さい。依存方向は必ず `packages/core -> packages/db -> apps/api` を守り、特に Repository は core 側で抽象 interface を先に定義してから、db 側の `packages/db/src/repositories` にそれを `implements` する Prisma 実装を置いて下さい。`packages/core/src/<bounded-context>/<layer>/<Component>/` 配下でも helper、error、type などの補助要素を直下へ平置きせず、`helpers/` `errors/` `types/` のような用途別サブディレクトリへ分けて下さい。`packages/db/src/repositories/<Repository>/` 配下では helper、mapper、error などの補助要素を直下へ平置きせず、`helpers/` `mappers/` `errors/` のような用途別サブディレクトリへ分けて下さい。Service / Repository の class は巨大化させず、各関数は原則 helper や mapper を呼ぶ薄い入口にして下さい。複雑な分岐、検証、整形、クエリ組み立て、永続化変換は class 本体ではなく helper / mapper へ逃がして下さい。そのコンポーネントに閉じない汎用関数は最も狭い共有範囲の `shared` へ寄せ、Repository には業務処理を書かずデータ IO と永続化変換だけを持たせて下さい。また、原則 1 ファイル 1 関数、1 ファイル 1 型、1 ファイル 1 責務で分離し、1 つのファイルへ多数の関数や型を抱え込まないで下さい。必要なコードコメントは日本語で書き、保守時に意図が追える短い説明を添えて下さい。設計書の不整合や不足があれば、推測で埋め切らずに確認事項として整理して下さい。"
